kind = "web"
previewPath = "/"
title = "NGO Platform - Andhra Pradesh"
version = "1.0.0"
id = "artifacts/ngo-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24007

[services.development]
run = "pnpm --filter @workspace/ngo-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ngo-platform", "run", "build" ]
publicDir = "artifacts/ngo-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24007"
BASE_PATH = "/"
