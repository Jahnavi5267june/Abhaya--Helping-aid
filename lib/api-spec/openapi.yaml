openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: NGO Platform API for Andhra Pradesh
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: organizations
    description: Old age homes and orphanages
  - name: donations
    description: Donor registrations
  - name: help-requests
    description: Help requests from people in need
  - name: documents
    description: Transparency documents and verification
  - name: disaster-relief
    description: Disaster relief campaigns
  - name: stats
    description: Platform statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List all organizations
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [old_age_home, orphanage, all]
        - name: district
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Organization"
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Add a new organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationBody"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /organizations/{id}:
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Organization"

  /donations:
    get:
      operationId: listDonations
      tags: [donations]
      summary: List donation registrations
      parameters:
        - name: organizationId
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
            enum: [money, food, clothes, other]
      responses:
        "200":
          description: List of donations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Donation"
    post:
      operationId: createDonation
      tags: [donations]
      summary: Register a new donation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDonationBody"
      responses:
        "201":
          description: Donation registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Donation"

  /help-requests:
    get:
      operationId: listHelpRequests
      tags: [help-requests]
      summary: List help requests
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, resolved]
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of help requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HelpRequest"
    post:
      operationId: createHelpRequest
      tags: [help-requests]
      summary: Submit a help request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHelpRequestBody"
      responses:
        "201":
          description: Help request submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HelpRequest"

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List transparency documents
      parameters:
        - name: organizationId
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
            enum: [audit_report, utilization_certificate, registration, annual_report, donation_receipt]
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Upload a transparency document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /disaster-relief:
    get:
      operationId: listDisasterRelief
      tags: [disaster-relief]
      summary: List disaster relief campaigns
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, closed, upcoming]
      responses:
        "200":
          description: List of disaster relief campaigns
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DisasterRelief"
    post:
      operationId: createDisasterRelief
      tags: [disaster-relief]
      summary: Create a disaster relief campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDisasterReliefBody"
      responses:
        "201":
          description: Campaign created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisasterRelief"

  /disaster-relief/{id}/contribute:
    post:
      operationId: contributeToDisasterRelief
      tags: [disaster-relief]
      summary: Contribute to a disaster relief campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContributeBody"
      responses:
        "200":
          description: Contribution recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DisasterRelief"

  /stats/overview:
    get:
      operationId: getStatsOverview
      tags: [stats]
      summary: Get platform-wide statistics overview
      responses:
        "200":
          description: Platform statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsOverview"

  /stats/donations-by-type:
    get:
      operationId: getDonationsByType
      tags: [stats]
      summary: Get donation breakdown by type
      responses:
        "200":
          description: Donations grouped by type
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DonationTypeStat"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Organization:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [old_age_home, orphanage]
        district:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        capacity:
          type: integer
        currentOccupancy:
          type: integer
        description:
          type: string
        established:
          type: integer
        verified:
          type: boolean
        imageUrl:
          type: string
        createdAt:
          type: string
      required: [id, name, type, district, address, latitude, longitude, verified, createdAt]

    CreateOrganizationBody:
      type: object
      properties:
        name:
          type: string
        type:
          type: string
          enum: [old_age_home, orphanage]
        district:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        capacity:
          type: integer
        description:
          type: string
        established:
          type: integer
      required: [name, type, district, address, latitude, longitude]

    Donation:
      type: object
      properties:
        id:
          type: integer
        donorName:
          type: string
        donorEmail:
          type: string
        donorPhone:
          type: string
        donorCity:
          type: string
        donationType:
          type: string
          enum: [money, food, clothes, other]
        amount:
          type: number
        description:
          type: string
        organizationId:
          type: integer
        organizationName:
          type: string
        status:
          type: string
          enum: [pending, confirmed, delivered]
        createdAt:
          type: string
      required: [id, donorName, donorEmail, donorPhone, donationType, organizationId, status, createdAt]

    CreateDonationBody:
      type: object
      properties:
        donorName:
          type: string
        donorEmail:
          type: string
        donorPhone:
          type: string
        donorCity:
          type: string
        donationType:
          type: string
          enum: [money, food, clothes, other]
        amount:
          type: number
        description:
          type: string
        organizationId:
          type: integer
      required: [donorName, donorEmail, donorPhone, donationType, organizationId]

    HelpRequest:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        location:
          type: string
        district:
          type: string
        category:
          type: string
          enum: [medical, shelter, food, education, disability_aid, elderly_care, other]
        description:
          type: string
        urgency:
          type: string
          enum: [low, medium, high, critical]
        status:
          type: string
          enum: [pending, in_progress, resolved]
        createdAt:
          type: string
      required: [id, name, phone, location, category, description, urgency, status, createdAt]

    CreateHelpRequestBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        location:
          type: string
        district:
          type: string
        category:
          type: string
          enum: [medical, shelter, food, education, disability_aid, elderly_care, other]
        description:
          type: string
        urgency:
          type: string
          enum: [low, medium, high, critical]
      required: [name, phone, location, category, description, urgency]

    Document:
      type: object
      properties:
        id:
          type: integer
        organizationId:
          type: integer
        organizationName:
          type: string
        title:
          type: string
        category:
          type: string
          enum: [audit_report, utilization_certificate, registration, annual_report, donation_receipt]
        year:
          type: integer
        fileUrl:
          type: string
        verifiedBy:
          type: string
        description:
          type: string
        uploadedAt:
          type: string
      required: [id, organizationId, title, category, year, uploadedAt]

    CreateDocumentBody:
      type: object
      properties:
        organizationId:
          type: integer
        title:
          type: string
        category:
          type: string
          enum: [audit_report, utilization_certificate, registration, annual_report, donation_receipt]
        year:
          type: integer
        fileUrl:
          type: string
        verifiedBy:
          type: string
        description:
          type: string
      required: [organizationId, title, category, year]

    DisasterRelief:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        district:
          type: string
        targetAmount:
          type: number
        raisedAmount:
          type: number
        status:
          type: string
          enum: [active, closed, upcoming]
        urgencyLevel:
          type: string
          enum: [low, medium, high, critical]
        startDate:
          type: string
        endDate:
          type: string
        contactPhone:
          type: string
        imageUrl:
          type: string
        createdAt:
          type: string
      required: [id, title, description, district, targetAmount, raisedAmount, status, urgencyLevel, createdAt]

    CreateDisasterReliefBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        district:
          type: string
        targetAmount:
          type: number
        urgencyLevel:
          type: string
          enum: [low, medium, high, critical]
        startDate:
          type: string
        endDate:
          type: string
        contactPhone:
          type: string
      required: [title, description, district, targetAmount, urgencyLevel]

    ContributeBody:
      type: object
      properties:
        donorName:
          type: string
        donorPhone:
          type: string
        amount:
          type: number
      required: [donorName, donorPhone, amount]

    StatsOverview:
      type: object
      properties:
        totalOrganizations:
          type: integer
        totalDonors:
          type: integer
        totalDonations:
          type: integer
        totalHelpRequests:
          type: integer
        resolvedHelpRequests:
          type: integer
        activeDisasterCampaigns:
          type: integer
        totalFundsRaised:
          type: number
        verifiedOrganizations:
          type: integer
      required: [totalOrganizations, totalDonors, totalDonations, totalHelpRequests, resolvedHelpRequests, activeDisasterCampaigns, totalFundsRaised, verifiedOrganizations]

    DonationTypeStat:
      type: object
      properties:
        type:
          type: string
        count:
          type: integer
        percentage:
          type: number
      required: [type, count, percentage]
